apiVersion: batch/v1
kind: Job
metadata:
  name: kalink-studio-migrate
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
spec:
  backoffLimit: 1
  template:
    spec:
      restartPolicy: Never
      imagePullSecrets:
        - name: ghcr-credentials
      containers:
        - name: migrate
          image: ghcr.io/kalink-studio/kalink:latest
          command: ["pnpm", "payload", "migrate"]
          env:
            - name: NODE_ENV
              value: "production"
            - name: DATABASE_URL_DIRECT
              valueFrom:
                secretKeyRef:
                  name: kalink-studio-secrets
                  key: DATABASE_URL_DIRECT
            - name: PAYLOAD_SECRET
              valueFrom:
                secretKeyRef:
                  name: kalink-studio-secrets
                  key: PAYLOAD_SECRET
            - name: NEXT_PUBLIC_SITE_URL
              valueFrom:
                secretKeyRef:
                  name: kalink-studio-secrets
                  key: NEXT_PUBLIC_SITE_URL
            - name: PAYLOAD_PUBLIC_SERVER_URL
              valueFrom:
                secretKeyRef:
                  name: kalink-studio-secrets
                  key: PAYLOAD_PUBLIC_SERVER_URL
            - name: S3_BUCKET
              valueFrom:
                secretKeyRef:
                  name: kalink-studio-secrets
                  key: S3_BUCKET
            - name: S3_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: kalink-studio-secrets
                  key: S3_ACCESS_KEY_ID
            - name: S3_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: kalink-studio-secrets
                  key: S3_SECRET_ACCESS_KEY
            - name: S3_ENDPOINT
              valueFrom:
                secretKeyRef:
                  name: kalink-studio-secrets
                  key: S3_ENDPOINT
            - name: S3_REGION
              valueFrom:
                secretKeyRef:
                  name: kalink-studio-secrets
                  key: S3_REGION
            - name: S3_FORCE_PATH_STYLE
              valueFrom:
                secretKeyRef:
                  name: kalink-studio-secrets
                  key: S3_FORCE_PATH_STYLE
